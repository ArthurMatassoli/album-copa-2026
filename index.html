<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Copa 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-context {
            -webkit-touch-callout: none;
            user-select: none;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-10">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-indigo-900 tracking-tight">Álbum 2026</h1>
            
            <div class="flex items-center gap-5">
                <label class="cursor-pointer text-indigo-600 hover:text-indigo-800 text-sm font-semibold transition flex items-center">
                    <svg class="w-5 h-5 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Importar CSV
                    <input type="file" id="csv-upload" accept=".csv" class="hidden">
                </label>

                <div class="relative group">
                    <button class="p-2 text-slate-500 hover:bg-slate-100 rounded-md transition focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    
                    <div class="absolute right-0 mt-2 w-64 bg-white border border-slate-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 p-4 transform origin-top-right">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Seu Progresso</h3>
                        <div class="flex items-end gap-2 mb-1">
                            <span id="progress-percent" class="text-3xl font-black text-indigo-600">0%</span>
                        </div>
                        <p id="progress-text" class="text-sm text-slate-500 mb-3">0 de 0 figurinhas</p>
                        
                        <div class="space-y-2 text-xs text-slate-600 border-t pt-3">
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-white border border-slate-300"></div> Faltando</div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-indigo-500"></div> Tenho</div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-amber-400"></div> Repetida</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto mt-8 px-4" id="album-container"></main>

    <script>
        // Lista base de seleções para deixar o álbum visível desde o começo
        const selecoesBase = [
            { id: 'CC', nome: 'Coca-Cola (CC)', total: 7 },
            { id: 'ALG', nome: 'Argélia (ALG)', total: 20 },
            { id: 'ARG', nome: 'Argentina (ARG)', total: 20 },
            { id: 'AUS', nome: 'Austrália (AUS)', total: 20 },
            { id: 'AUT', nome: 'Áustria (AUT)', total: 20 },
            { id: 'BEL', nome: 'Bélgica (BEL)', total: 20 },
            { id: 'BIH', nome: 'Bósnia (BIH)', total: 20 },
            { id: 'BRA', nome: 'Brasil (BRA)', total: 20 },
            { id: 'ENG', nome: 'Inglaterra (ENG)', total: 20 },
            { id: 'ESP', nome: 'Espanha (ESP)', total: 20 },
            { id: 'FRA', nome: 'França (FRA)', total: 20 },
            { id: 'GER', nome: 'Alemanha (GER)', total: 20 },
            { id: 'POR', nome: 'Portugal (POR)', total: 20 },
            { id: 'QAT', nome: 'Catar (QAT)', total: 20 },
            { id: 'RSA', nome: 'África do Sul (RSA)', total: 20 },
            { id: 'SCO', nome: 'Escócia (SCO)', total: 20 },
            { id: 'SEN', nome: 'Senegal (SEN)', total: 20 },
            { id: 'SUI', nome: 'Suíça (SUI)', total: 20 },
            { id: 'SWE', nome: 'Suécia (SWE)', total: 20 },
            { id: 'TUN', nome: 'Tunísia (TUN)', total: 20 }
        ];

        // Carrega as seleções do cache ou usa a base. Carrega as figurinhas.
        let selecoes = JSON.parse(localStorage.getItem('albumSelecoes_v3')) || selecoesBase;
        let figurinhasSalvas = JSON.parse(localStorage.getItem('albumCopa2026_v3')) || {};

        const container = document.getElementById('album-container');
        const progressPercent = document.getElementById('progress-percent');
        const progressText = document.getElementById('progress-text');

        // Lida com a importação do CSV
        document.getElementById('csv-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) { processarCSV(event.target.result); };
            reader.readAsText(file);
        });

        function processarCSV(csvText) {
            // Remove o \r para evitar problemas de formatação do Windows e divide por linhas
            const lines = csvText.replace(/\r/g, '').split('\n');
            let figurinhasImportadas = 0;

            // Procura a linha de cabeçalho dinamicamente
            let startRow = 1;
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].toLowerCase().includes('seleções') || lines[i].toLowerCase().includes('selecoes')) {
                    startRow = i + 1;
                    break;
                }
            }

            // Lê as linhas com os dados
            for (let i = startRow; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = line.split(',');
                // Na sua planilha, as siglas estão na segunda coluna (índice 1)
                const selecaoId = cols[1] ? cols[1].trim() : null; 
                
                if (!selecaoId) continue;

                // Verifica quantas colunas de figurinhas têm preenchimento nessa linha (até 20)
                let maxFigurinhas = 0;
                for (let j = 1; j <= 20; j++) {
                    if (cols[j + 1] !== undefined && cols[j + 1] !== '') {
                        maxFigurinhas = j;
                        const value = cols[j + 1].trim().toLowerCase();
                        // Se estiver True ou Verdadeiro na planilha, marca como "Tenho" (1)
                        if (value === 'true' || value === 'verdadeiro' || value === '1') {
                            figurinhasSalvas[`${selecaoId}-${j}`] = 1;
                            figurinhasImportadas++;
                        }
                    }
                }

                // Se essa seleção estiver na planilha mas não estiver na nossa lista base, adiciona ela
                const selecaoExiste = selecoes.find(s => s.id === selecaoId);
                if (!selecaoExiste && maxFigurinhas > 0) {
                    selecoes.push({ id: selecaoId, nome: selecaoId, total: maxFigurinhas });
                }
            }

            salvarDados();
            renderizarAlbum();
            alert(`Planilha lida com sucesso! ${figurinhasImportadas} figurinhas foram marcadas.`);
        }

        function salvarDados() {
            localStorage.setItem('albumSelecoes_v3', JSON.stringify(selecoes));
            localStorage.setItem('albumCopa2026_v3', JSON.stringify(figurinhasSalvas));
        }

        function renderizarAlbum() {
            container.innerHTML = '';
            let totalFigurinhas = 0;
            let figurinhasObtidas = 0;

            selecoes.forEach(selecao => {
                const section = document.createElement('div');
                section.className = 'mb-8';
                
                const title = document.createElement('h2');
                title.className = 'text-sm font-bold text-slate-400 uppercase tracking-widest mb-3 ml-1';
                title.textContent = selecao.nome;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'flex flex-wrap gap-2';

                for (let i = 1; i <= selecao.total; i++) {
                    totalFigurinhas++;
                    const key = `${selecao.id}-${i}`;
                    const status = figurinhasSalvas[key] || 0;

                    if (status > 0) figurinhasObtidas++;

                    const btn = document.createElement('button');
                    btn.textContent = i;
                    
                    let baseClass = 'w-10 h-10 text-xs sm:text-sm font-semibold rounded-lg flex items-center justify-center transition-all duration-200 transform active:scale-95 no-context shadow-sm relative ';
                    
                    if (status === 0) { // Faltando
                        baseClass += 'bg-white text-slate-400 border border-slate-200 hover:border-indigo-300 hover:text-indigo-500';
                    } else if (status === 1) { // Tenho
                        baseClass += 'bg-indigo-500 text-white shadow-indigo-200/50 hover:bg-indigo-600';
                    } else if (status === 2) { // Repetida
                        baseClass += 'bg-amber-400 text-white shadow-amber-200/50 hover:bg-amber-500';
                        btn.innerHTML = `${i} <span class="absolute -top-1 -right
