<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Copa 2026 - Colaborativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-context { -webkit-touch-callout: none; user-select: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col">

    <div id="auth-screen" class="flex-1 items-center justify-center p-4 fade-in overflow-y-auto py-10" style="display: flex;">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 my-auto">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-indigo-900 tracking-tight mb-2">Álbum 2026</h1>
                <p class="text-slate-500 text-sm" id="auth-subtitle">Faça login ou cadastre-se para acessar.</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div id="signup-fields-top" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Nome Completo</label>
                        <input type="text" id="auth-name" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 transition" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Celular (WhatsApp)</label>
                        <input type="tel" id="auth-phone" placeholder="(XX) XXXXX-XXXX" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 transition" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">E-mail</label>
                    <input type="email" id="auth-email" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Senha</label>
                        <button type="button" onclick="recuperarSenha()" class="text-xs font-bold text-indigo-600 hover:underline focus:outline-none">Esqueci a senha</button>
                    </div>
                    <input type="password" id="auth-password" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>

                <div id="confirm-password-container">
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Confirmar Senha</label>
                    <input type="password" id="auth-confirm-password" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 transition" required>
                </div>

                <p id="auth-error-msg" class="text-red-500 text-xs font-bold text-center hidden pt-2"></p>

                <button type="submit" id="auth-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transition transform active:scale-95 mt-4">
                    Cadastrar e Entrar
                </button>
            </form>

            <div class="mt-6 text-center text-sm">
                <span class="text-slate-500" id="auth-toggle-text">Já tem uma conta?</span>
                <button type="button" onclick="toggleAuthMode()" class="text-indigo-600 font-bold hover:underline ml-1 focus:outline-none" id="auth-toggle-btn">Fazer Login</button>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden flex-1 p-4 fade-in max-w-5xl mx-auto w-full pt-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-slate-200 pb-4">
            <div>
                <h2 class="text-3xl font-extrabold text-indigo-900 tracking-tight">Meus Álbuns</h2>
                <p class="text-sm text-slate-500 mt-1" id="dash-user-email"></p>
            </div>
            <div class="flex gap-3">
                <button onclick="abrirModalNovoProjeto()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg font-bold text-sm shadow hover:bg-indigo-700 transition transform active:scale-95">
                    + Novo Álbum
                </button>
                <button onclick="logout()" class="bg-white border border-slate-300 text-slate-600 px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-slate-50 transition">
                    Sair
                </button>
            </div>
        </div>
        <div id="projects-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </div>

    <div id="app-screen" class="hidden fade-in pb-10">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
            <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-3">
                <div class="flex items-center gap-3">
                    <button onclick="voltarDashboard()" class="text-slate-400 hover:text-indigo-600 transition p-1 bg-slate-100 rounded-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <h1 class="text-xl font-extrabold text-indigo-900 tracking-tight truncate max-w-[200px]" id="album-title-display">Nome do Álbum</h1>
                </div>
                
                <div class="flex flex-wrap items-center gap-2 sm:gap-4 justify-center">
                    <select id="sort-select" class="text-xs sm:text-sm bg-slate-100 border border-slate-200 text-slate-700 font-semibold py-1.5 px-2 rounded-md outline-none cursor-pointer hover:bg-slate-200 transition">
                        <option value="album">Ordem do Álbum</option>
                        <option value="alfabetica">Ordem Alfabética</option>
                        <option value="preenchidas">Mais Preenchidas</option>
                    </select>

                    <button type="button" onclick="document.getElementById('csv-upload').click()" class="cursor-pointer text-indigo-600 hover:bg-indigo-50 text-sm font-semibold transition flex items-center bg-white border border-slate-200 py-1.5 px-3 rounded-md shadow-sm">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span class="hidden sm:inline">Importar CSV</span>
                    </button>
                    <input type="file" id="csv-upload" accept=".csv" style="display: none;">

                    <button onclick="gerarLinkConvite()" class="text-blue-600 hover:bg-blue-50 border border-blue-200 text-sm font-semibold transition flex items-center bg-white py-1.5 px-3 rounded-md shadow-sm">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                        <span class="hidden md:inline">Convidar</span>
                    </button>

                    <button onclick="compartilharWhatsApp()" class="text-green-700 hover:bg-green-50 text-sm font-semibold transition flex items-center bg-white border border-green-200 py-1.5 px-3 rounded-md shadow-sm">
                        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                        <span class="hidden md:inline">Faltantes</span>
                    </button>

                    <div class="relative group">
                        <button class="p-2 text-slate-500 hover:bg-slate-100 rounded-md transition outline-none">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        </button>
                        <div class="absolute right-0 mt-2 w-64 bg-white border border-slate-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 p-4 transform origin-top-right">
                            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Progresso do Álbum</h3>
                            <div class="flex items-end gap-2 mb-1"><span id="progress-percent" class="text-3xl font-black text-indigo-600">0%</span></div>
                            <p id="progress-text" class="text-sm text-slate-500 mb-3">0 de 0 figurinhas</p>
                            <div class="space-y-2 text-xs text-slate-600 border-t pt-3">
                                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-white border border-slate-300"></div> Faltando</div>
                                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-indigo-500"></div> Temos</div>
                                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-amber-400"></div> Repetida</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-5xl mx-auto mt-6 sm:mt-8 px-4" id="album-container"></main>
    </div>

    <div id="modal-novo-projeto" class="fixed inset-0 bg-slate-900 bg-opacity-50 flex justify-center items-center z-50 hidden fade-in">
        <div class="bg-white w-full max-w-sm rounded-xl shadow-2xl p-6 m-4">
            <h2 class="text-xl font-bold text-indigo-900 mb-4">Criar Novo Álbum</h2>
            <input type="text" id="novo-nome" placeholder="Nome (Ex: Álbum da Família)" class="w-full border rounded-lg p-2 mb-3 outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" id="nova-senha" placeholder="Senha do Álbum (Opcional)" class="w-full border rounded-lg p-2 mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
            <div class="flex justify-end gap-2">
                <button onclick="fecharModalNovoProjeto()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg transition">Cancelar</button>
                <button onclick="confirmarNovoProjeto()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition">Criar Álbum</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9vc7dUgXZOmF5LIiPeGgbXwfvLztZAWI", 
            authDomain: "album-copa-2026-501f4.firebaseapp.com",
            projectId: "album-copa-2026-501f4",
            storageBucket: "album-copa-2026-501f4.firebasestorage.app",
            messagingSenderId: "121031368831",
            appId: "1:121031368831:web:79971041ab3a5c39559f4a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.isSignup = true;
        window.currentProjectId = null;
        window.unsubscribeAlbum = null;
        window.unsubscribeProjetos = null;
        let selecoes = [];
        let figurinhasSalvas = {};

        // Checar se a pessoa abriu um Link de Convite
        const urlParams = new URLSearchParams(window.location.search);
        let pendingJoinId = urlParams.get('join');

        // MAPA DE BANDEIRAS
        window.getBandeiraUrl = (code) => {
            const flags = {
                'FWC_1': 'https://upload.wikimedia.org/wikipedia/pt/2/23/Logotipo_da_Copa_do_Mundo_FIFA_de_2026.png',
                'CC': 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Coca-Cola_logo.svg/200px-Coca-Cola_logo.svg.png',
                'MEX': 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Flag_of_Mexico.svg/200px-Flag_of_Mexico.svg.png',
                'RSA': 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Flag_of_South_Africa.svg/200px-Flag_of_South_Africa.svg.png',
                'KOR': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Flag_of_South_Korea.svg/200px-Flag_of_South_Korea.svg.png',
                'CZE': 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_Czech_Republic.svg/200px-Flag_of_the_Czech_Republic.svg.png',
                'DEFAULT': `flags/${code}.png`
            };
            return flags[code] || flags['DEFAULT'];
        };

        const ordemDaFoto = [
            'FWC_1', 'MEX', 'RSA', 'KOR', 'CZE', 'CAN', 'BIH', 'QAT', 'SUI',
            'BRA', 'MAR', 'HAI', 'SCO', 'USA', 'PAR', 'AUS', 'TUR',
            'GER', 'CUW', 'CIV', 'ECU', 'NED', 'JPN', 'SWE', 'TUN',
            'BEL', 'EGY', 'IRN', 'NZL', 'ESP', 'CPV', 'KSA', 'URU',
            'FRA', 'SEN', 'IRQ', 'NOR', 'ARG', 'ALG', 'AUT', 'JOR',
            'POR', 'COD', 'UZB', 'COL', 'ENG', 'CRO', 'GHA', 'PAN',
            'FWC_2', 'CC'
        ];

        // GERA A ESTRUTURA OFICIAL 2026 AUTOMATICAMENTE
        function gerarSelecoesPadrao() {
            const nomes = {
                'MEX': 'México', 'RSA': 'África do Sul', 'KOR': 'Coreia do Sul', 'CZE': 'República Tcheca',
                'CAN': 'Canadá', 'BIH': 'Bósnia e Herzegovina', 'QAT': 'Catar', 'SUI': 'Suíça',
                'BRA': 'Brasil', 'MAR': 'Marrocos', 'HAI': 'Haiti', 'SCO': 'Escócia',
                'USA': 'Estados Unidos', 'PAR': 'Paraguai', 'AUS': 'Austrália', 'TUR': 'Turquia',
                'GER': 'Alemanha', 'CUW': 'Curaçao', 'CIV': 'Costa do Marfim', 'ECU': 'Equador',
                'NED': 'Holanda', 'JPN': 'Japão', 'SWE': 'Suécia', 'TUN': 'Tunísia',
                'BEL': 'Bélgica', 'EGY': 'Egito', 'IRN': 'Irã', 'NZL': 'Nova Zelândia',
                'ESP': 'Espanha', 'CPV': 'Cabo Verde', 'KSA': 'Arábia Saudita', 'URU': 'Uruguai',
                'FRA': 'França', 'SEN': 'Senegal', 'IRQ': 'Iraque', 'NOR': 'Noruega',
                'ARG': 'Argentina', 'ALG': 'Argélia', 'AUT': 'Áustria', 'JOR': 'Jordânia',
                'POR': 'Portugal', 'COD': 'RD Congo', 'UZB': 'Uzbequistão', 'COL': 'Colômbia',
                'ENG': 'Inglaterra', 'CRO': 'Croácia', 'GHA': 'Gana', 'PAN': 'Panamá'
            };

            return ordemDaFoto.map((id, index) => {
                if (id === 'FWC_1') return { id: 'FWC_1', originalId: 'FWC', nome: 'FWC (1 ao 8)', start: 1, end: 8, leituraIndex: index };
                if (id === 'FWC_2') return { id: 'FWC_2', originalId: 'FWC', nome: 'FWC (9 ao 19)', start: 9, end: 19, leituraIndex: index };
                if (id === 'CC') return { id: 'CC', originalId: 'CC', nome: 'Coca-Cola', start: 1, end: 14, leituraIndex: index };
                return { id: id, originalId: id, nome: nomes[id] || id, start: 1, end: 20, leituraIndex: index };
            });
        }

        // -------------------------
        // FLUXO DE LOGIN E CONVITE
        // -------------------------
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('dash-user-email').textContent = `Logado como: ${user.email}`;
                
                if (pendingJoinId) {
                    await tentarEntrarNoProjeto(pendingJoinId);
                    pendingJoinId = null; 
                    window.history.replaceState({}, document.title, window.location.pathname); 
                } else {
                    document.getElementById('dashboard-screen').style.display = 'block';
                    ouvirProjetosLista();
                }
            } else {
                document.getElementById('dashboard-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'flex';
                if(pendingJoinId) {
                    document.getElementById('auth-subtitle').innerHTML = "<span class='text-indigo-600 font-bold'>Você foi convidado para um Álbum!</span> Crie sua conta ou faça login para aceitar.";
                }
            }
        });

        window.toggleAuthMode = () => {
            window.isSignup = !window.isSignup;
            document.getElementById('auth-error-msg').classList.add('hidden');
            document.getElementById('signup-fields-top').style.display = window.isSignup ? 'block' : 'none';
            document.getElementById('confirm-password-container').style.display = window.isSignup ? 'block' : 'none';
            document.getElementById('forgot-password-btn').style.display = window.isSignup ? 'none' : 'block';
            document.getElementById('auth-submit-btn').textContent = window.isSignup ? 'Cadastrar e Entrar' : 'Entrar';
            document.getElementById('auth-toggle-text').textContent = window.isSignup ? 'Já tem uma conta?' : 'Ainda não tem conta?';
            document.getElementById('auth-toggle-btn').textContent = window.isSignup ? 'Fazer Login' : 'Cadastrar';
            document.getElementById('auth-name').required = window.isSignup;
            document.getElementById('auth-phone').required = window.isSignup;
            document.getElementById('auth-confirm-password').required = window.isSignup;
        };

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('auth-error-msg');
            errorMsg.classList.add('hidden');
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;

            try {
                if (window.isSignup) {
                    if (pass !== document.getElementById('auth-confirm-password').value) throw new Error("As senhas não coincidem.");
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        nome: document.getElementById('auth-name').value,
                        telefone: document.getElementById('auth-phone').value,
                        email: email,
                        criadoEm: serverTimestamp()
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (error) {
                errorMsg.textContent = error.message.includes("coincidem") ? error.message : "Credenciais inválidas ou e-mail em uso.";
                errorMsg.classList.remove('hidden');
            }
        });

        window.logout = () => signOut(auth);

        // -------------------------
        // GESTÃO DE PROJETOS E CONVITES
        // -------------------------
        function ouvirProjetosLista() {
            window.unsubscribeProjetos = onSnapshot(collection(db, "projetos_album"), (snapshot) => {
                const list = document.getElementById('projects-list');
                list.innerHTML = '';
                const myEmail = auth.currentUser.email;
                let encontrou = false;

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const souDono = data.owner === myEmail;
                    const souConvidado = data.guests && data.guests.includes(myEmail);

                    if (souDono || souConvidado) {
                        encontrou = true;
                        const roleTag = souDono ? '<span class="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded font-bold">Dono</span>' : '<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded font-bold">Convidado</span>';
                        
                        list.innerHTML += `
                            <div onclick="abrirProjeto('${docSnap.id}', '${data.nomeProjeto}')" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-lg cursor-pointer transition transform hover:-translate-y-1">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477-4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                    </div>
                                    ${roleTag}
                                </div>
                                <h3 class="font-extrabold text-lg text-slate-800 truncate">${data.nomeProjeto}</h3>
                                <p class="text-xs font-semibold text-slate-400 mt-1">${(data.guests ? data.guests.length : 0) + 1} Participantes</p>
                            </div>
                        `;
                    }
                });

                if(!encontrou) {
                    list.innerHTML = `<div class="col-span-full text-center py-10"><p class="text-slate-400">Nenhum álbum encontrado. Crie o seu primeiro projeto!</p></div>`;
                }
            });
        }

        window.abrirModalNovoProjeto = () => document.getElementById('modal-novo-projeto').classList.remove('hidden');
        window.fecharModalNovoProjeto = () => document.getElementById('modal-novo-projeto').classList.add('hidden');

        window.confirmarNovoProjeto = async () => {
            const nome = document.getElementById('novo-nome').value;
            const senha = document.getElementById('nova-senha').value;
            if (!nome || nome.trim() === "") return alert("Dê um nome ao álbum.");

            try {
                await addDoc(collection(db, "projetos_album"), {
                    nomeProjeto: nome,
                    owner: auth.currentUser.email,
                    guests: [],
                    senha: senha || null, 
                    selecoes: gerarSelecoesPadrao(),
                    figurinhasSalvas: {},
                    criadoEm: serverTimestamp()
                });
                window.fecharModalNovoProjeto();
                document.getElementById('novo-nome').value = '';
                document.getElementById('nova-senha').value = '';
            } catch (e) { alert("Erro: " + e.message); }
        };

        async function tentarEntrarNoProjeto(id) {
            const ref = doc(db, "projetos_album", id);
            const snap = await getDoc(ref);
            
            if (!snap.exists()) {
                alert("Este link de convite é inválido ou o álbum foi excluído.");
                document.getElementById('dashboard-screen').style.display = 'block';
                ouvirProjetosLista();
                return;
            }

            const data = snap.data();
            const myEmail = auth.currentUser.email;

            if (data.owner === myEmail || (data.guests && data.guests.includes(myEmail))) {
                abrirProjeto(id, data.nomeProjeto);
                return;
            }

            if (data.senha) {
                const digitou = prompt(`O álbum "${data.nomeProjeto}" exige senha para entrar:`);
                if (digitou !== data.senha) {
                    alert("Senha incorreta!");
                    document.getElementById('dashboard-screen').style.display = 'block';
                    ouvirProjetosLista();
                    return;
                }
            }

            await updateDoc(ref, { guests: arrayUnion(myEmail) });
            alert("Você entrou no álbum com sucesso!");
            abrirProjeto(id, data.nomeProjeto);
        }

        window.gerarLinkConvite = () => {
            const link = `${window.location.origin}${window.location.pathname}?join=${window.currentProjectId}`;
            navigator.clipboard.writeText(link).then(() => {
                alert("Link de convite copiado!\n\nEnvie para seus amigos. Eles entrarão neste álbum.");
            }).catch(() => {
                alert("Copie este link para enviar: \n" + link);
            });
        };

        // -------------------------
        // RENDERIZAÇÃO E EDIÇÃO DO ÁLBUM
        // -------------------------
        window.abrirProjeto = (projectId, projectName) => {
            window.currentProjectId = projectId;
            document.getElementById('dashboard-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('album-title-display').textContent = projectName;

            if(window.unsubscribeAlbum) window.unsubscribeAlbum();
            window.unsubscribeAlbum = onSnapshot(doc(db, "projetos_album", projectId), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    selecoes = data.selecoes || [];
                    figurinhasSalvas = data.figurinhasSalvas || {};
                    renderizarAlbum();
                }
            });
        };

        window.voltarDashboard = () => {
            window.currentProjectId = null;
            if(window.unsubscribeAlbum) window.unsubscribeAlbum();
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
        };

        async function salvarDadosNoBanco() {
            if (!window.currentProjectId) return;
            await updateDoc(doc(db, "projetos_album", window.currentProjectId), {
                figurinhasSalvas: figurinhasSalvas
            });
        }

        // CSV MOBILE BLINDADO (Carrega no banco e ignora estrutura de projeto anterior)
        document.getElementById('csv-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) { 
                processarCSV(evt.target.result); 
                e.target.value = ''; // Permite subir o mesmo arquivo de novo se errar
            };
            reader.readAsText(file);
        });

        function processarCSV(csvText) {
            const lines = csvText.replace(/\r/g, '').split('\n');
            let newState = {};
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cols = line.split(',');
                const selecaoId = cols[1] ? cols[1].trim() : ''; 
                if (!selecaoId || ['seleções', 'total'].includes(selecaoId.toLowerCase())) continue;

                if (selecaoId === 'FWC') {
                    for (let j = 1; j <= 19; j++) {
                        if (['true', 'verdadeiro', '1'].includes(cols[j + 1] ? cols[j + 1].trim().toLowerCase() : '')) {
                            newState[`FWC-${j}`] = 1; 
                        }
                    }
                } else {
                    for (let j = 1; j <= 50; j++) {
                        if (cols[j + 1] !== undefined && cols[j + 1].trim() !== '') {
                            if (['true', 'verdadeiro', '1'].includes(cols[j + 1].trim().toLowerCase())) {
                                newState[`${selecaoId}-${j}`] = 1; 
                            }
                        }
                    }
                }
            }
            
            figurinhasSalvas = newState;
            salvarDadosNoBanco();
            alert(`Sucesso! Planilha processada e álbum atualizado.`);
        }

        function contarPreenchidas(selecao) {
            let count = 0;
            for (let i = selecao.start; i <= selecao.end; i++) {
                if (figurinhasSalvas[`${selecao.originalId}-${i}`] > 0) count++;
            }
            return count;
        }

        document.getElementById('sort-select').addEventListener('change', renderizarAlbum);

        function renderizarAlbum() {
            const container = document.getElementById('album-container');
            container.innerHTML = '';
            
            let totalFigurinhas = 0;
            let figurinhasObtidas = 0;
            let selecoesRender = [...selecoes];
            const modoOrdenacao = document.getElementById('sort-select').value;

            if (modoOrdenacao === 'album') {
                selecoesRender.sort((a, b) => (a.leituraIndex || 0) - (b.leituraIndex || 0));
            } else if (modoOrdenacao === 'alfabetica') {
                selecoesRender.sort((a, b) => a.nome.localeCompare(b.nome));
            } else if (modoOrdenacao === 'preenchidas') {
                selecoesRender.sort((a, b) => {
                    const countA = contarPreenchidas(a);
                    const countB = contarPreenchidas(b);
                    if (countA === countB) return (a.leituraIndex || 0) - (b.leituraIndex || 0);
                    return countB - countA;
                });
            }

            selecoesRender.forEach(selecao => {
                const section = document.createElement('div');
                section.className = 'mb-8';
                const qtdPreenchidas = contarPreenchidas(selecao);
                const totalDestaSelecao = (selecao.end - selecao.start) + 1;
                
                const titleContainer = document.createElement('div');
                titleContainer.className = 'flex justify-between items-center mb-3 ml-1 border-b border-slate-200 pb-1';
                
                const title = document.createElement('h2');
                title.className = 'text-sm font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2';
                
                const imgFlag = document.createElement('img');
                imgFlag.src = window.getBandeiraUrl(selecao.id);
                imgFlag.alt = selecao.nome;
                imgFlag.className = 'w-5 h-3.5 object-cover rounded shadow-sm';
                imgFlag.onerror = () => imgFlag.style.display = 'none';
                
                const spanName = document.createElement('span');
                spanName.textContent = selecao.nome;
                title.appendChild(imgFlag);
                title.appendChild(spanName);

                const counter = document.createElement('span');
                counter.className = 'text-xs font-semibold text-slate-400';
                counter.textContent = `${qtdPreenchidas}/${totalDestaSelecao}`;
                
                titleContainer.appendChild(title);
                titleContainer.appendChild(counter);
                section.appendChild(titleContainer);

                const grid = document.createElement('div');
                grid.className = 'flex flex-wrap gap-2';

                for (let i = selecao.start; i <= selecao.end; i++) {
                    totalFigurinhas++;
                    const key = `${selecao.originalId}-${i}`;
                    const status = figurinhasSalvas[key] || 0;
                    if (status > 0) figurinhasObtidas++;

                    const btn = document.createElement('button');
                    btn.textContent = i;
                    let baseClass = 'w-10 h-10 text-xs sm:text-sm font-semibold rounded-lg flex items-center justify-center transition-all duration-200 transform active:scale-95 no-context shadow-sm relative ';
                    
                    if (status === 0) baseClass += 'bg-white text-slate-400 border border-slate-200';
                    else if (status === 1) baseClass += 'bg-indigo-500 text-white';
                    else if (status === 2) {
                        baseClass += 'bg-amber-400 text-white';
                        btn.innerHTML = `${i} <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-[10px] text-white font-bold ring-2 ring-white">+1</span>`;
                    }
                    btn.className = baseClass;

                    let isLongPress = false;
                    let pressTimer;

                    const startPress = () => {
                        isLongPress = false;
                        pressTimer = setTimeout(() => {
                            isLongPress = true;
                            if(navigator.vibrate) navigator.vibrate(50);
                            figurinhasSalvas[key] = (status === 2) ? 0 : 2;
                            salvarDadosNoBanco();
                        }, 500);
                    };
                    const cancelPress = () => clearTimeout(pressTimer);
                    const endPress = (evt) => {
                        evt.preventDefault();
                        clearTimeout(pressTimer);
                        if (!isLongPress) {
                            if (status === 0) figurinhasSalvas[key] = 1; 
                            else if (status === 1) figurinhasSalvas[key] = 0;
                            else if (status === 2) figurinhasSalvas[key] = 1;
                            salvarDadosNoBanco();
                        }
                    };

                    btn.addEventListener('mousedown', startPress);
                    btn.addEventListener('touchstart', startPress, {passive: false});
                    btn.addEventListener('mouseup', endPress);
                    btn.addEventListener('touchend', endPress, {passive: false});
                    btn.addEventListener('mouseleave', cancelPress);
                    btn.addEventListener('touchmove', cancelPress, {passive: true});

                    grid.appendChild(btn);
                }
                section.appendChild(grid);
                container.appendChild(section);
            });

            const percentual = totalFigurinhas === 0 ? 0 : Math.round((figurinhasObtidas / totalFigurinhas) * 100);
            document.getElementById('progress-percent').textContent = `${percentual}%`;
            document.getElementById('progress-text').textContent = `${figurinhasObtidas} de ${totalFigurinhas} figurinhas`;
        }

        window.compartilharWhatsApp = () => {
            if (selecoes.length === 0) return alert("Álbum vazio!");
            const nomeProjeto = document.getElementById('album-title-display').textContent;
            let text = `⚽ Olá! Estou completando meu álbum "${nomeProjeto}". Alguém tem essas para trocar?\n\n*FALTAM:*\n`;
            let faltamTotal = 0;
            selecoes.forEach(selecao => {
                let missing = [];
                for (let i = selecao.start; i <= selecao.end; i++) {
                    const key = `${selecao.originalId}-${i}`;
                    if (!figurinhasSalvas[key] || figurinhasSalvas[key] === 0) {
                        missing.push(i);
                        faltamTotal++;
                    }
                }
                if (missing.length > 0) text += `*${selecao.nome}*: ${missing.join(', ')}\n`;
            });
            if (faltamTotal === 0) return alert("Álbum 100% completo!");
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        };
    </script>
</body>
