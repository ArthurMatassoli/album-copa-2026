<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Copa 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Desabilita o menu de contexto do celular para o toque longo funcionar perfeitamente */
        .no-context {
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        /* Estilização moderna da barra de rolagem (para PC) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-10">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-indigo-900 tracking-tight">Álbum 2026</h1>
            
            <div class="flex items-center gap-5">
                <label class="cursor-pointer text-indigo-600 hover:text-indigo-800 text-sm font-semibold transition flex items-center">
                    <svg class="w-5 h-5 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Importar CSV
                    <input type="file" id="csv-upload" accept=".csv" class="hidden">
                </label>

                <div class="relative group">
                    <button class="p-2 text-slate-500 hover:bg-slate-100 rounded-md transition focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    
                    <div class="absolute right-0 mt-2 w-64 bg-white border border-slate-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 p-4 transform origin-top-right">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Seu Progresso</h3>
                        <div class="flex items-end gap-2 mb-1">
                            <span id="progress-percent" class="text-3xl font-black text-indigo-600">0%</span>
                        </div>
                        <p id="progress-text" class="text-sm text-slate-500 mb-3">0 de 0 figurinhas</p>
                        
                        <div class="space-y-2 text-xs text-slate-600 border-t pt-3">
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-white border border-slate-300"></div> Faltando</div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-indigo-500"></div> Tenho</div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-amber-400"></div> Repetida</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto mt-8 px-4" id="album-container">
        </main>

    <script>
        // Estado: 0 = Não tenho, 1 = Tenho, 2 = Repetida
        let selecoes = JSON.parse(localStorage.getItem('albumSelecoes')) || [];
        let figurinhasSalvas = JSON.parse(localStorage.getItem('albumCopa2026_v2')) || {};

        // Rotina rápida para migrar os dados antigos (se você já tinha marcado como True/False antes)
        const oldState = JSON.parse(localStorage.getItem('albumCopa2026'));
        if (oldState && Object.keys(figurinhasSalvas).length === 0) {
            for (let key in oldState) {
                figurinhasSalvas[key] = oldState[key] ? 1 : 0;
            }
            localStorage.setItem('albumCopa2026_v2', JSON.stringify(figurinhasSalvas));
        }

        const container = document.getElementById('album-container');
        const progressPercent = document.getElementById('progress-percent');
        const progressText = document.getElementById('progress-text');

        // Lida com a importação do arquivo CSV
        document.getElementById('csv-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) { processarCSV(event.target.result); };
            reader.readAsText(file);
        });

        function processarCSV(csvText) {
            const lines = csvText.split('\n');
            let newState = {};
            let newSelecoes = [];

            for (let i = 4; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cols = line.split(',');
                const selecaoId = cols[1];
                if (!selecaoId || selecaoId === 'Seleções') continue;

                let maxFigurinhas = 0;
                for (let j = 1; j <= 20; j++) {
                    if (cols[j + 1] !== undefined && cols[j + 1] !== '') maxFigurinhas = j;
                }
                newSelecoes.push({ id: selecaoId, nome: selecaoId, total: maxFigurinhas });

                for (let j = 1; j <= maxFigurinhas; j++) {
                    const value = cols[j + 1] ? cols[j + 1].trim().toLowerCase() : '';
                    if (value === 'true') newState[`${selecaoId}-${j}`] = 1; // 1 = Tenho
                }
            }

            selecoes = newSelecoes;
            figurinhasSalvas = newState;
            salvarDados();
            renderizarAlbum();
        }

        function salvarDados() {
            localStorage.setItem('albumSelecoes', JSON.stringify(selecoes));
            localStorage.setItem('albumCopa2026_v2', JSON.stringify(figurinhasSalvas));
        }

        function renderizarAlbum() {
            container.innerHTML = '';
            let totalFigurinhas = 0;
            let figurinhasObtidas = 0;

            if (selecoes.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 mt-20"><svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg><p class="text-lg font-semibold">Nenhuma figurinha no álbum.</p><p class="text-sm">Clique em "Importar CSV" lá em cima para carregar sua planilha.</p></div>';
                return;
            }

            // Criação das seções do álbum
            selecoes.forEach(selecao => {
                const section = document.createElement('div');
                section.className = 'mb-8';
                
                const title = document.createElement('h2');
                title.className = 'text-sm font-bold text-slate-400 uppercase tracking-widest mb-3 ml-1';
                title.textContent = selecao.nome;
                section.appendChild(title);

                const grid = document.createElement('div');
                // Flex wrap permite que os botões se ajustem melhor na tela e fiquem menores
                grid.className = 'flex flex-wrap gap-2';

                for (let i = 1; i <= selecao.total; i++) {
                    totalFigurinhas++;
                    const key = `${selecao.id}-${i}`;
                    const status = figurinhasSalvas[key] || 0;

                    if (status > 0) figurinhasObtidas++;

                    const btn = document.createElement('button');
                    btn.textContent = i;
                    
                    // Design base dos botões menores
                    let baseClass = 'w-10 h-10 text-xs sm:text-sm font-semibold rounded-lg flex items-center justify-center transition-all
